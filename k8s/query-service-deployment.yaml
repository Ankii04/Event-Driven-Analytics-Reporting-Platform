apiVersion: apps/v1
kind: Deployment
metadata:
  name: query-service
  namespace: analytics-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: query-service
  template:
    metadata:
      labels:
        app: query-service
    spec:
      containers:
      - name: query-service
        image: ghcr.io/ankii04/analytics-platform-query-service:main
        ports:
        - containerPort: 3002
        envFrom:
        - configMapRef:
            name: analytics-config
        - secretRef:
            name: analytics-secrets
        env:
        - name: PORT
          value: "3002"
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: query-service
  namespace: analytics-platform
spec:
  selector:
    app: query-service
  ports:
  - port: 3002
    targetPort: 3002
    protocol: TCP
