apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-ingestion
  namespace: analytics-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: event-ingestion
  template:
    metadata:
      labels:
        app: event-ingestion
    spec:
      containers:
      - name: event-ingestion
        image: ghcr.io/ankii04/analytics-platform-event-ingestion:main
        ports:
        - containerPort: 3001
        envFrom:
        - configMapRef:
            name: analytics-config
        - secretRef:
            name: analytics-secrets
        env:
        - name: PORT
          value: "3001"
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: event-ingestion
  namespace: analytics-platform
spec:
  selector:
    app: event-ingestion
  ports:
  - port: 3001
    targetPort: 3001
    protocol: TCP
