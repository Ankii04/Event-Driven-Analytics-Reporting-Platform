apiVersion: v1
kind: ConfigMap
metadata:
  name: analytics-config
  namespace: analytics-platform
data:
  KAFKA_BROKERS: "kafka:9092"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "analytics_db"
  MONGODB_URI: "mongodb://analytics:analytics123@mongodb:27017/analytics_db?authSource=admin"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  ELASTICSEARCH_NODE: "http://elasticsearch:9200"
  LOG_LEVEL: "info"
  RATE_LIMIT_TTL: "60"
  RATE_LIMIT_MAX: "100"
